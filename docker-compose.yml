version: '3.8'

services:
  mtm-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtm-server
    restart: unless-stopped
    ports:
      # QUIC Control plane port (UDP)
      - "9000:9000/udp"
      # Public HTTP port
      - "80:80/tcp"
      # Public HTTPS port
      - "443:443/tcp"
    environment:
      # Inject environment variables from .env
      - MTM_SERVER_ADDR=0.0.0.0:9000
      - MTM_DOMAIN=${MTM_DOMAIN:-localhost}
      - MTM_AUTH_TOKEN=${MTM_AUTH_TOKEN}
      - MTM_ACME_EMAIL=${MTM_ACME_EMAIL}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - MTM_HTTP_PORT=80
      - MTM_HTTPS_PORT=443
      - MTM_DB_PATH=/app/data/config.db
      - MTM_DEPLOY_DIR=/app/deployed
    volumes:
      # Persist Let's Encrypt certs to prevent hitting limits on container restarts
      - certs-data:/app/certs
      # Persist SQLite config database
      - db-data:/app/data
      # Persist static deployments
      - deployed-data:/app/deployed

volumes:
  certs-data:
    driver: local
  db-data:
    driver: local
  deployed-data:
    driver: local

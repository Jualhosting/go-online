<script>
    // Tab Switcher Logic
    const tabSignIn = document.getElementById('tab-signin');
    const tabCreate = document.getElementById('tab-create');
    const signInView = document.getElementById('signin-view');
    const mfaView = document.getElementById('mfa-view');
    const loginForm = document.getElementById('login-form');
    const backToLogin = document.getElementById('back-to-login');

    const setActiveTab = (activeTab, inactiveTab) => {
      activeTab.classList.add('text-primary', 'bg-primary-container/10');
      activeTab.classList.remove('text-on-surface-variant');
      inactiveTab.classList.remove('text-primary', 'bg-primary-container/10');
      inactiveTab.classList.add('text-on-surface-variant');
    };

    tabSignIn.addEventListener('click', () => setActiveTab(tabSignIn, tabCreate));
    tabCreate.addEventListener('click', () => setActiveTab(tabCreate, tabSignIn));

    // Form Submission Mock Flow
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      signInView.classList.add('hidden');
      mfaView.classList.remove('hidden');
      document.querySelector('.bg-surface-container-low').classList.add('opacity-30', 'pointer-events-none');
    });

    backToLogin.addEventListener('click', () => {
      mfaView.classList.add('hidden');
      signInView.classList.remove('hidden');
      document.querySelector('.bg-surface-container-low').classList.remove('opacity-30', 'pointer-events-none');
    });

    // OTP Input Autofocus sequence
    const otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          otpInputs[index - 1].focus();
        }
      });
    });

    // Countdown Timer logic
    let timeLeft = 45;
    const countdownEl = document.getElementById('countdown').querySelector('.text-primary');
    const timerInterval = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        document.getElementById('countdown').innerHTML = "OTP Expired";
      } else {
        countdownEl.innerText = `${timeLeft}s`;
      }
    }, 1000);
  </script>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid #1E293B;
        }
        .chart-grid {
            background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .terminal-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>

<body class="bg-background text-on-surface font-body-md selection:bg-primary/30">
<!-- Sidebar Navigation -->
<aside class="fixed left-0 top-0 h-screen w-sidebar-width border-r border-outline-variant bg-surface flex flex-col py-lg z-50 hidden md:flex">
<div class="px-md mb-xl">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 bg-primary rounded flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary">bolt</span>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-headline-md font-bold text-on-surface">GoInstant</span>
<span class="text-[10px] font-label-caps uppercase tracking-widest text-outline">Developer Platform</span>
</div>
</div>
</div>
<nav class="flex-1 space-y-1">
<div class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-variant/50 cursor-pointer transition-colors group">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-body-sm text-body-sm">Dashboard</span>
</div>
<div class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-variant/50 cursor-pointer transition-colors group">
<span class="material-symbols-outlined">language</span>
<span class="font-body-sm text-body-sm">Domains</span>
</div>
<div class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-variant/50 cursor-pointer transition-colors group">
<span class="material-symbols-outlined">webhook</span>
<span class="font-body-sm text-body-sm">Webhooks</span>
</div>
<div class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-variant/50 cursor-pointer transition-colors group">
<span class="material-symbols-outlined">folder_open</span>
<span class="font-body-sm text-body-sm">Files</span>
</div>
<div class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-variant/50 cursor-pointer transition-colors group">
<span class="material-symbols-outlined">groups</span>
<span class="font-body-sm text-body-sm">Team</span>
</div>
<div class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-variant/50 cursor-pointer transition-colors group">
<span class="material-symbols-outlined">payments</span>
<span class="font-body-sm text-body-sm">Billing</span>
</div>
<div class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-variant/50 cursor-pointer transition-colors group">
<span class="material-symbols-outlined">settings</span>
<span class="font-body-sm text-body-sm">Settings</span>
</div>
<div class="flex items-center gap-sm px-md py-sm text-on-surface-variant hover:bg-surface-variant/50 cursor-pointer transition-colors group">
<span class="material-symbols-outlined">description</span>
<span class="font-body-sm text-body-sm">Docs</span>
</div>
<!-- Active Tab -->
<div class="flex items-center gap-sm px-md py-sm text-primary border-l-2 border-primary bg-primary-container/10 cursor-pointer transition-opacity active:opacity-80">
<span class="material-symbols-outlined">analytics</span>
<span class="font-body-sm text-body-sm">Status</span>
</div>
</nav>
<div class="px-md mt-auto pt-md border-t border-outline-variant space-y-4">
<button class="w-full py-sm px-md bg-surface-variant/30 border border-outline-variant text-on-surface rounded flex items-center justify-center gap-2 hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-[18px]">description</span>
<span class="font-body-sm">Documentation</span>
</button>
<div class="flex justify-between items-center text-on-surface-variant">
<div class="flex items-center gap-2 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined">dark_mode</span>
</div>
<div class="flex items-center gap-2 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined">help</span>
</div>
</div>

<!-- Main Content Area -->
<main class="md:ml-sidebar-width min-h-screen flex flex-col">

<div class="relative w-full max-w-md hidden md:block">

</div>
</div>
<div class="flex items-center gap-md">
<button class="hidden lg:flex items-center px-4 py-1.5 bg-surface-variant/20 border border-outline-variant rounded text-body-sm hover:bg-surface-variant/40 transition-all cursor-pointer active:scale-95">Upgrade</button>
<button class="bg-primary text-on-primary-container px-4 py-1.5 rounded font-bold text-body-sm hover:opacity-90 transition-all cursor-pointer active:scale-95">New Project</button>
<div class="h-8 w-[1px] bg-outline-variant mx-2"></div>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors">notifications</span>
